<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traitome Intelligence | 征域</title>
  <meta name="description" content="Mega · Swift · Intelligent — Reimagining biology through systems-scale computation">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030508;
      --primary: #00ff9d;
      --cyan: #00e5ff;
      --purple: #a855f7;
      --text: #e2e8f0;
      --text-muted: #64748b;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
    }
    
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 90%);
    }
    
    .content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }
    
    .brand { margin-bottom: 2rem; }
    
    .brand-en {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    
    .brand-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 0.5rem;
      letter-spacing: 0.5em;
      padding-left: 0.5em;
    }
    
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    
    .tagline-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--text);
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }
    
    .pillars {
      display: flex;
      gap: 3rem;
      margin-bottom: 2rem;
    }
    
    .pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    
    .pillar-en {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    
    .pillar-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.25rem;
      font-weight: 500;
    }
    
    .pillar:nth-child(1) .pillar-en { color: var(--primary); }
    .pillar:nth-child(1) .pillar-zh { color: var(--primary); }
    .pillar:nth-child(2) .pillar-en { color: var(--cyan); }
    .pillar:nth-child(2) .pillar-zh { color: var(--cyan); }
    .pillar:nth-child(3) .pillar-en { color: var(--purple); }
    .pillar:nth-child(3) .pillar-zh { color: var(--purple); }
    
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: 1rem 0;
    }
    
    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      pointer-events: auto;
    }
    
    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .footer a:hover { color: var(--primary); }
    
    @media (max-width: 768px) {
      .pillars { gap: 1.5rem; }
      .pillar-en { font-size: 0.6rem; }
      .pillar-zh { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="vignette"></div>
  
  <div class="content">
    <div class="brand">
      <div class="brand-en">TRAITOME</div>
      <div class="brand-zh">征域</div>
    </div>
    <div class="tagline">Mega · Swift · Intelligent</div>
    <div class="tagline-zh">以系统尺度之算，重思生命之码</div>
    <div class="pillars">
      <div class="pillar">
        <span class="pillar-en">Mega</span>
        <span class="pillar-zh">海量</span>
      </div>
      <div class="pillar">
        <span class="pillar-en">Swift</span>
        <span class="pillar-zh">极速</span>
      </div>
      <div class="pillar">
        <span class="pillar-en">Intelligent</span>
        <span class="pillar-zh">智识</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="footer"><a href="https://github.com/Traitome" target="_blank" rel="noopener">github.com/Traitome</a></div>
  </div>
  
  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let W, H, centerX, centerY, scale;
      
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        centerX = W / 2;
        centerY = H / 2;
        scale = Math.min(W, H) / 1000;
      }
      window.addEventListener('resize', resize);
      resize();
      
      const colors = ['#00ff9d', '#00e5ff', '#a855f7', '#f59e0b', '#f43f5e', '#22d3ee'];
      
      // Elegant human silhouette - inspired by Da Vinci's Vitruvian Man
      function getHumanPoints() {
        const points = [];
        
        // Helper: add smooth curve points
        function addCurve(pts, segments) {
          for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            let x = 0, y = 0;
            for (let j = 0; j < pts.length - 1; j += 2) {
              const basis = bernstein(t, Math.floor(j / 2), pts.length / 2 - 1);
              x += pts[j] * basis;
              y += pts[j + 1] * basis;
            }
            points.push({ x, y });
          }
        }
        
        function bernstein(t, i, n) {
          return binomial(n, i) * Math.pow(t, i) * Math.pow(1 - t, n - i);
        }
        
        function binomial(n, k) {
          let result = 1;
          for (let i = 0; i < k; i++) result *= (n - i) / (i + 1);
          return result;
        }
        
        // Head - perfect circle
        const headRadius = 45;
        for (let i = 0; i < 40; i++) {
          const angle = (i / 40) * Math.PI * 2;
          points.push({ x: Math.cos(angle) * headRadius, y: -220 + Math.sin(angle) * headRadius });
        }
        
        // Face - minimal elegant features
        // Eyes
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2;
          points.push({ x: -15 + Math.cos(angle) * 5, y: -228 + Math.sin(angle) * 3 });
          points.push({ x: 15 + Math.cos(angle) * 5, y: -228 + Math.sin(angle) * 3 });
        }
        
        // Neck - graceful column
        for (let i = 0; i <= 8; i++) {
          const t = i / 8;
          const w = 18 - t * 4;
          points.push({ x: -w, y: -175 + t * 30 });
          points.push({ x: w, y: -175 + t * 30 });
        }
        
        // Shoulders - wide elegant arc
        for (let i = 0; i <= 24; i++) {
          const t = i / 24;
          const angle = Math.PI + t * Math.PI;
          const r = 110;
          points.push({ x: Math.cos(angle) * r, y: -140 + Math.sin(angle) * 20 });
        }
        
        // Torso - harmonious proportions (golden ratio inspired)
        // Upper chest
        for (let i = 0; i <= 20; i++) {
          const t = i / 20;
          const angle = Math.PI - t * Math.PI;
          const rx = 55, ry = 12;
          points.push({ x: Math.cos(angle) * rx, y: -120 + Math.sin(angle) * ry });
        }
        
        // Ribcage
        for (let i = 0; i <= 20; i++) {
          const t = i / 20;
          const angle = Math.PI - t * Math.PI;
          const rx = 50, ry = 10;
          points.push({ x: Math.cos(angle) * rx, y: -80 + Math.sin(angle) * ry });
        }
        
        // Waist
        for (let i = 0; i <= 20; i++) {
          const t = i / 20;
          const angle = Math.PI - t * Math.PI;
          const rx = 38, ry = 8;
          points.push({ x: Math.cos(angle) * rx, y: -40 + Math.sin(angle) * ry });
        }
        
        // Hips
        for (let i = 0; i <= 20; i++) {
          const t = i / 20;
          const angle = Math.PI - t * Math.PI;
          const rx = 52, ry = 12;
          points.push({ x: Math.cos(angle) * rx, y: 0 + Math.sin(angle) * ry });
        }
        
        // Central axis
        for (let i = 0; i <= 30; i++) {
          const t = i / 30;
          points.push({ x: 0, y: -175 + t * 350 });
        }
        
        // Arms - elegant extended pose
        // Left arm
        for (let i = 0; i <= 15; i++) {
          const t = i / 15;
          points.push({ x: -110 - t * 30, y: -140 + t * 60 });
        }
        for (let i = 0; i <= 12; i++) {
          const t = i / 12;
          points.push({ x: -140 + t * 20, y: -80 + t * 100 });
        }
        // Left hand
        for (let i = 0; i < 16; i++) {
          const angle = (i / 16) * Math.PI * 2;
          points.push({ x: -130 + Math.cos(angle) * 18, y: 20 + Math.sin(angle) * 22 });
        }
        
        // Right arm
        for (let i = 0; i <= 15; i++) {
          const t = i / 15;
          points.push({ x: 110 + t * 30, y: -140 + t * 60 });
        }
        for (let i = 0; i <= 12; i++) {
          const t = i / 12;
          points.push({ x: 140 - t * 20, y: -80 + t * 100 });
        }
        for (let i = 0; i < 16; i++) {
          const angle = (i / 16) * Math.PI * 2;
          points.push({ x: 130 + Math.cos(angle) * 18, y: 20 + Math.sin(angle) * 22 });
        }
        
        // Legs - classical proportions
        // Left leg
        for (let i = 0; i <= 18; i++) {
          const t = i / 18;
          points.push({ x: -28 - t * 8, y: 15 + t * 100 });
          points.push({ x: -38 - t * 5, y: 15 + t * 100 });
        }
        // Left knee
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2;
          points.push({ x: -32 + Math.cos(angle) * 14, y: 115 + Math.sin(angle) * 10 });
        }
        // Left lower leg
        for (let i = 0; i <= 18; i++) {
          const t = i / 18;
          points.push({ x: -30 - t * 6, y: 115 + t * 100 });
          points.push({ x: -38 - t * 3, y: 115 + t * 100 });
        }
        // Left foot
        for (let i = 0; i < 14; i++) {
          const angle = (i / 14) * Math.PI * 2;
          points.push({ x: -35 + Math.cos(angle) * 22, y: 215 + Math.sin(angle) * 8 });
        }
        
        // Right leg
        for (let i = 0; i <= 18; i++) {
          const t = i / 18;
          points.push({ x: 28 + t * 8, y: 15 + t * 100 });
          points.push({ x: 38 + t * 5, y: 15 + t * 100 });
        }
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2;
          points.push({ x: 32 + Math.cos(angle) * 14, y: 115 + Math.sin(angle) * 10 });
        }
        for (let i = 0; i <= 18; i++) {
          const t = i / 18;
          points.push({ x: 30 + t * 6, y: 115 + t * 100 });
          points.push({ x: 38 + t * 3, y: 115 + t * 100 });
        }
        for (let i = 0; i < 14; i++) {
          const angle = (i / 14) * Math.PI * 2;
          points.push({ x: 35 + Math.cos(angle) * 22, y: 215 + Math.sin(angle) * 8 });
        }
        
        // Energy flow lines (subtle)
        for (let ring = 0; ring < 3; ring++) {
          const r = 80 + ring * 50;
          for (let i = 0; i < 30; i++) {
            const t = i / 30;
            const angle = t * Math.PI * 2;
            points.push({ x: Math.cos(angle) * r * 0.8, y: -100 + Math.sin(angle) * r * 0.3 });
          }
        }
        
        return points;
      }
      
      // Elegant universe - spiral galaxy
      function getUniversePoints() {
        const points = [];
        
        // Central bright core
        for (let i = 0; i < 60; i++) {
          const angle = Math.random() * Math.PI * 2;
          const r = Math.pow(Math.random(), 0.5) * 25;
          points.push({
            x: Math.cos(angle) * r,
            y: Math.sin(angle) * r * 0.5
          });
        }
        
        // Main spiral arms - elegant logarithmic spiral
        for (let arm = 0; arm < 2; arm++) {
          const armOffset = (arm / 2) * Math.PI;
          for (let i = 0; i < 80; i++) {
            const t = i / 80;
            const angle = t * Math.PI * 6 + armOffset;
            const r = 25 + t * 220;
            const spread = 8 + t * 35;
            const spiralX = Math.cos(angle) * r;
            const spiralY = Math.sin(angle) * r * 0.45;
            points.push({
              x: spiralX + (Math.random() - 0.5) * spread,
              y: spiralY + (Math.random() - 0.5) * spread * 0.45
            });
          }
        }
        
        // Outer stellar halo
        for (let i = 0; i < 100; i++) {
          const angle = Math.random() * Math.PI * 2;
          const r = 180 + Math.random() * 120;
          points.push({
            x: Math.cos(angle) * r,
            y: Math.sin(angle) * r * 0.5
          });
        }
        
        // Scattered field stars
        for (let i = 0; i < 120; i++) {
          const angle = Math.random() * Math.PI * 2;
          const r = 30 + Math.random() * 280;
          points.push({
            x: Math.cos(angle) * r,
            y: Math.sin(angle) * r * 0.55
          });
        }
        
        // Constellation patterns
        const constellations = [
          [[-200, -100], [-180, -80], [-160, -90], [-140, -70]],
          [[180, -80], [200, -60], [220, -70], [240, -50]],
          [[-150, 80], [-130, 100], [-110, 90], [-90, 110]],
          [[160, 60], [180, 80], [170, 100], [190, 90]],
        ];
        constellations.forEach(c => c.forEach(([x, y]) => points.push({ x, y })));
        
        // Nebula clouds
        for (let cloud = 0; cloud < 6; cloud++) {
          const cx = (Math.random() - 0.5) * 450;
          const cy = (Math.random() - 0.5) * 200;
          for (let i = 0; i < 12; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.random() * 35;
            points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r * 0.5 });
          }
        }
        
        // Orbital rings
        for (let ring = 0; ring < 4; ring++) {
          const r = 80 + ring * 55;
          for (let i = 0; i < 50; i++) {
            const t = i / 50;
            const angle = t * Math.PI * 2;
            points.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r * 0.35 });
          }
        }
        
        return points;
      }
      
      const humanPoints = getHumanPoints();
      const universePoints = getUniversePoints();
      const numPoints = Math.max(humanPoints.length, universePoints.length);
      
      while (humanPoints.length < numPoints) {
        const src = humanPoints[Math.floor(Math.random() * humanPoints.length)];
        humanPoints.push({ x: src.x + (Math.random() - 0.5) * 15, y: src.y + (Math.random() - 0.5) * 15 });
      }
      while (universePoints.length < numPoints) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * 250;
        universePoints.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r * 0.5 });
      }
      
      const currentPoints = humanPoints.map(p => ({ x: p.x, y: p.y }));
      
      let morphProgress = 0;
      let morphDirection = 1;
      const morphSpeed = 0.0008;
      const pauseDuration = 150;
      let pauseCounter = 0;
      let isPaused = false;
      
      const particles = currentPoints.map((_, i) => ({
        color: colors[i % colors.length],
        size: 1.0 + Math.random() * 1.5,
        pulseOffset: Math.random() * Math.PI * 2,
        pulseSpeed: 0.012 + Math.random() * 0.015
      }));
      
      let frame = 0;
      
      function easeInOutQuart(t) {
        return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
      }
      
      function draw() {
        ctx.fillStyle = 'rgba(3, 5, 8, 0.12)';
        ctx.fillRect(0, 0, W, H);
        
        frame++;
        
        if (isPaused) {
          pauseCounter--;
          if (pauseCounter <= 0) isPaused = false;
        } else {
          morphProgress += morphSpeed * morphDirection;
          if (morphProgress >= 1) {
            morphProgress = 1;
            morphDirection = -1;
            isPaused = true;
            pauseCounter = pauseDuration;
          } else if (morphProgress <= 0) {
            morphProgress = 0;
            morphDirection = 1;
            isPaused = true;
            pauseCounter = pauseDuration;
          }
        }
        
        const easedProgress = easeInOutQuart(morphProgress);
        
        for (let i = 0; i < numPoints; i++) {
          currentPoints[i].x = humanPoints[i].x + (universePoints[i].x - humanPoints[i].x) * easedProgress;
          currentPoints[i].y = humanPoints[i].y + (universePoints[i].y - humanPoints[i].y) * easedProgress;
        }
        
        // Connections
        ctx.strokeStyle = 'rgba(100, 116, 139, 0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i < numPoints; i++) {
          for (let j = i + 1; j < numPoints; j++) {
            const dx = currentPoints[i].x - currentPoints[j].x;
            const dy = currentPoints[i].y - currentPoints[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 45) {
              ctx.beginPath();
              ctx.moveTo(centerX + currentPoints[i].x * scale, centerY + currentPoints[i].y * scale);
              ctx.lineTo(centerX + currentPoints[j].x * scale, centerY + currentPoints[j].y * scale);
              ctx.stroke();
            }
          }
        }
        
        // Points with glow
        currentPoints.forEach((p, i) => {
          const particle = particles[i];
          const pulse = Math.sin(frame * particle.pulseSpeed + particle.pulseOffset) * 0.2 + 1;
          const x = centerX + p.x * scale;
          const y = centerY + p.y * scale;
          const r = particle.size * pulse * scale * 0.35;
          
          const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 5);
          grad.addColorStop(0, particle.color);
          grad.addColorStop(0.25, particle.color + '40');
          grad.addColorStop(1, 'transparent');
          
          ctx.beginPath();
          ctx.arc(x, y, r * 5, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
          
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = particle.color;
          ctx.fill();
        });
        
        requestAnimationFrame(draw);
      }
      
      draw();
    })();
  </script>
</body>
</html>
