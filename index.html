<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traitome Intelligence | 征域</title>
  <meta name="description" content="Mega · Swift · Intelligent — Reimagining biology through systems-scale computation">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030508;
      --primary: #00ff9d;
      --cyan: #00e5ff;
      --purple: #a855f7;
      --text: #e2e8f0;
      --text-muted: #64748b;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
    }
    
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 90%);
    }
    
    .content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }
    
    .brand {
      margin-bottom: 2rem;
    }
    
    .brand-en {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    
    .brand-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 0.5rem;
      letter-spacing: 0.5em;
      padding-left: 0.5em;
    }
    
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    
    .tagline-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--text);
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }
    
    .pillars {
      display: flex;
      gap: 3rem;
      margin-bottom: 2rem;
    }
    
    .pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    
    .pillar-en {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    
    .pillar-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.25rem;
      font-weight: 500;
    }
    
    .pillar:nth-child(1) .pillar-en { color: var(--primary); }
    .pillar:nth-child(1) .pillar-zh { color: var(--primary); }
    .pillar:nth-child(2) .pillar-en { color: var(--cyan); }
    .pillar:nth-child(2) .pillar-zh { color: var(--cyan); }
    .pillar:nth-child(3) .pillar-en { color: var(--purple); }
    .pillar:nth-child(3) .pillar-zh { color: var(--purple); }
    
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: 1rem 0;
    }
    
    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      pointer-events: auto;
    }
    
    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .footer a:hover {
      color: var(--primary);
    }
    
    @media (max-width: 768px) {
      .pillars { gap: 1.5rem; }
      .pillar-en { font-size: 0.6rem; }
      .pillar-zh { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="vignette"></div>
  
  <div class="content">
    <div class="brand">
      <div class="brand-en">TRAITOME</div>
      <div class="brand-zh">征域</div>
    </div>
    
    <div class="tagline">Mega · Swift · Intelligent</div>
    <div class="tagline-zh">以系统尺度之算，重思生命之码</div>
    
    <div class="pillars">
      <div class="pillar">
        <span class="pillar-en">Mega</span>
        <span class="pillar-zh">海量</span>
      </div>
      <div class="pillar">
        <span class="pillar-en">Swift</span>
        <span class="pillar-zh">极速</span>
      </div>
      <div class="pillar">
        <span class="pillar-en">Intelligent</span>
        <span class="pillar-zh">智识</span>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="footer"><a href="https://github.com/Traitome" target="_blank" rel="noopener">github.com/Traitome</a></div>
  </div>
  
  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let W, H, centerX, centerY, scale;
      
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        centerX = W / 2;
        centerY = H / 2;
        scale = Math.min(W, H) / 800;
      }
      window.addEventListener('resize', resize);
      resize();
      
      const colors = ['#00ff9d', '#00e5ff', '#a855f7', '#f59e0b', '#f43f5e'];
      
      // Human body points (simplified silhouette)
      function getHumanPoints() {
        const points = [];
        // Head
        for (let i = 0; i < 20; i++) {
          const angle = (i / 20) * Math.PI * 2;
          points.push({ x: Math.cos(angle) * 35, y: -180 + Math.sin(angle) * 40 });
        }
        // Neck
        points.push({ x: 0, y: -130 });
        // Shoulders
        for (let i = 0; i <= 10; i++) {
          points.push({ x: -80 + i * 16, y: -110 });
        }
        // Left arm
        for (let i = 0; i <= 8; i++) {
          points.push({ x: -80 - i * 5, y: -110 + i * 20 });
        }
        for (let i = 0; i <= 6; i++) {
          points.push({ x: -120 + i * 3, y: 50 + i * 20 });
        }
        // Right arm
        for (let i = 0; i <= 8; i++) {
          points.push({ x: 80 + i * 5, y: -110 + i * 20 });
        }
        for (let i = 0; i <= 6; i++) {
          points.push({ x: 120 - i * 3, y: 50 + i * 20 });
        }
        // Torso
        points.push({ x: -40, y: -100 });
        points.push({ x: 40, y: -100 });
        points.push({ x: -45, y: -50 });
        points.push({ x: 45, y: -50 });
        points.push({ x: -40, y: 0 });
        points.push({ x: 40, y: 0 });
        points.push({ x: -35, y: 50 });
        points.push({ x: 35, y: 50 });
        // Hip
        for (let i = 0; i <= 8; i++) {
          points.push({ x: -35 + i * 8.75, y: 70 });
        }
        // Left leg
        for (let i = 0; i <= 10; i++) {
          points.push({ x: -25 - i * 2, y: 70 + i * 18 });
        }
        for (let i = 0; i <= 5; i++) {
          points.push({ x: -45 + i * 2, y: 250 + i * 15 });
        }
        // Right leg
        for (let i = 0; i <= 10; i++) {
          points.push({ x: 25 + i * 2, y: 70 + i * 18 });
        }
        for (let i = 0; i <= 5; i++) {
          points.push({ x: 45 - i * 2, y: 250 + i * 15 });
        }
        // Spine
        for (let i = 0; i <= 12; i++) {
          points.push({ x: 0, y: -100 + i * 20 });
        }
        // Face features
        points.push({ x: -12, y: -185 }); // left eye
        points.push({ x: 12, y: -185 }); // right eye
        points.push({ x: 0, y: -170 }); // nose
        points.push({ x: -8, y: -160 }); // mouth left
        points.push({ x: 8, y: -160 }); // mouth right
        
        return points;
      }
      
      // Universe/Cosmos points (galaxy spiral + stars)
      function getUniversePoints() {
        const points = [];
        // Spiral galaxy arms
        for (let arm = 0; arm < 3; arm++) {
          const armOffset = (arm / 3) * Math.PI * 2;
          for (let i = 0; i < 40; i++) {
            const t = i / 40;
            const angle = t * Math.PI * 4 + armOffset;
            const r = 50 + t * 200;
            points.push({
              x: Math.cos(angle) * r,
              y: Math.sin(angle) * r * 0.4
            });
          }
        }
        // Central core
        for (let i = 0; i < 30; i++) {
          const angle = Math.random() * Math.PI * 2;
          const r = Math.random() * 40;
          points.push({
            x: Math.cos(angle) * r,
            y: Math.sin(angle) * r * 0.4
          });
        }
        // Scattered stars
        for (let i = 0; i < 50; i++) {
          const angle = Math.random() * Math.PI * 2;
          const r = 100 + Math.random() * 180;
          points.push({
            x: Math.cos(angle) * r,
            y: Math.sin(angle) * r * 0.6
          });
        }
        // Constellation patterns
        const constellations = [
          [[0, -150], [20, -140], [40, -145], [60, -130]], // Big dipper part
          [[-80, 100], [-60, 90], [-40, 95], [-50, 70]], // Orion part
          [[100, 50], [120, 60], [110, 80], [130, 90]], // Cassiopeia part
        ];
        constellations.forEach(constellation => {
          constellation.forEach(([x, y]) => points.push({ x, y }));
        });
        
        return points;
      }
      
      const humanPoints = getHumanPoints();
      const universePoints = getUniversePoints();
      const numPoints = Math.max(humanPoints.length, universePoints.length);
      
      // Normalize point counts
      while (humanPoints.length < numPoints) {
        humanPoints.push({ x: (Math.random() - 0.5) * 100, y: (Math.random() - 0.5) * 100 });
      }
      while (universePoints.length < numPoints) {
        universePoints.push({ x: (Math.random() - 0.5) * 300, y: (Math.random() - 0.5) * 200 });
      }
      
      // Current animated points
      const currentPoints = humanPoints.map(p => ({ x: p.x, y: p.y }));
      
      // Animation state
      let morphProgress = 0; // 0 = human, 1 = universe
      let morphDirection = 1; // 1 = towards universe, -1 = towards human
      const morphSpeed = 0.003;
      const pauseDuration = 60; // frames to pause at each state
      let pauseCounter = 0;
      let isPaused = false;
      
      // Particle properties
      const particles = currentPoints.map((_, i) => ({
        color: colors[i % colors.length],
        size: 1.5 + Math.random() * 2,
        pulseOffset: Math.random() * Math.PI * 2,
        pulseSpeed: 0.02 + Math.random() * 0.03
      }));
      
      let frame = 0;
      
      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }
      
      function draw() {
        ctx.fillStyle = 'rgba(3, 5, 8, 0.2)';
        ctx.fillRect(0, 0, W, H);
        
        frame++;
        
        // Handle morphing
        if (isPaused) {
          pauseCounter--;
          if (pauseCounter <= 0) {
            isPaused = false;
          }
        } else {
          morphProgress += morphSpeed * morphDirection;
          
          if (morphProgress >= 1) {
            morphProgress = 1;
            morphDirection = -1;
            isPaused = true;
            pauseCounter = pauseDuration;
          } else if (morphProgress <= 0) {
            morphProgress = 0;
            morphDirection = 1;
            isPaused = true;
            pauseCounter = pauseDuration;
          }
        }
        
        const easedProgress = easeInOutCubic(morphProgress);
        
        // Update current points with interpolation
        for (let i = 0; i < numPoints; i++) {
          currentPoints[i].x = humanPoints[i].x + (universePoints[i].x - humanPoints[i].x) * easedProgress;
          currentPoints[i].y = humanPoints[i].y + (universePoints[i].y - humanPoints[i].y) * easedProgress;
        }
        
        // Draw connections (skeletal structure)
        ctx.strokeStyle = 'rgba(100, 116, 139, 0.08)';
        ctx.lineWidth = 1;
        
        for (let i = 0; i < numPoints; i++) {
          for (let j = i + 1; j < numPoints; j++) {
            const dx = currentPoints[i].x - currentPoints[j].x;
            const dy = currentPoints[i].y - currentPoints[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 60) {
              ctx.beginPath();
              ctx.moveTo(centerX + currentPoints[i].x * scale, centerY + currentPoints[i].y * scale);
              ctx.lineTo(centerX + currentPoints[j].x * scale, centerY + currentPoints[j].y * scale);
              ctx.stroke();
            }
          }
        }
        
        // Draw points with glow
        currentPoints.forEach((p, i) => {
          const particle = particles[i];
          const pulse = Math.sin(frame * particle.pulseSpeed + particle.pulseOffset) * 0.3 + 1;
          const x = centerX + p.x * scale;
          const y = centerY + p.y * scale;
          const r = particle.size * pulse * scale * 0.5;
          
          // Glow
          const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 5);
          grad.addColorStop(0, particle.color);
          grad.addColorStop(0.3, particle.color + '60');
          grad.addColorStop(1, 'transparent');
          
          ctx.beginPath();
          ctx.arc(x, y, r * 5, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
          
          // Core
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = particle.color;
          ctx.fill();
        });
        
        requestAnimationFrame(draw);
      }
      
      draw();
    })();
  </script>
</body>
</html>
