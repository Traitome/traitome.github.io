<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traitome Intelligence | 征域</title>
  <meta name="description" content="Mega · Swift · Intelligent — Reimagining biology through systems-scale computation">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030508;
      --primary: #00ff9d;
      --cyan: #00e5ff;
      --purple: #a855f7;
      --text: #e2e8f0;
      --text-muted: #64748b;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
    }
    
    #dna-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, var(--bg) 90%);
    }
    
    .content {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    
    .brand {
      margin-bottom: 2rem;
    }
    
    .brand-en {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    
    .brand-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, var(--cyan) 50%, var(--purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-top: 0.5rem;
      letter-spacing: 0.5em;
      padding-left: 0.5em;
    }
    
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      color: var(--text-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    
    .tagline-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--text);
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }
    
    .pillars {
      display: flex;
      gap: 3rem;
      margin-bottom: 2rem;
    }
    
    .pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    
    .pillar-en {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    
    .pillar-zh {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 1.25rem;
      font-weight: 500;
    }
    
    .pillar:nth-child(1) .pillar-en { color: var(--primary); }
    .pillar:nth-child(1) .pillar-zh { color: var(--primary); }
    .pillar:nth-child(2) .pillar-en { color: var(--cyan); }
    .pillar:nth-child(2) .pillar-zh { color: var(--cyan); }
    .pillar:nth-child(3) .pillar-en { color: var(--purple); }
    .pillar:nth-child(3) .pillar-zh { color: var(--purple); }
    
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin: 1rem 0;
    }
    
    .footer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    
    @media (max-width: 768px) {
      .pillars { gap: 1.5rem; }
      .pillar-en { font-size: 0.6rem; }
      .pillar-zh { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="dna-canvas"></canvas>
  <div class="vignette"></div>
  
  <div class="content">
    <div class="brand">
      <div class="brand-en">TRAITOME</div>
      <div class="brand-zh">征域</div>
    </div>
    
    <div class="tagline">Mega · Swift · Intelligent</div>
    <div class="tagline-zh">以系统尺度之算，重思生命之码</div>
    
    <div class="pillars">
      <div class="pillar">
        <span class="pillar-en">Mega</span>
        <span class="pillar-zh">海量</span>
      </div>
      <div class="pillar">
        <span class="pillar-en">Swift</span>
        <span class="pillar-zh">极速</span>
      </div>
      <div class="pillar">
        <span class="pillar-en">Intelligent</span>
        <span class="pillar-zh">智识</span>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="footer">github.com/Traitome</div>
  </div>
  
  <script>
    (function() {
      const canvas = document.getElementById('dna-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, rotation = 0;
      
      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();
      
      const basePairs = 50;
      const radius = Math.min(W, H) * 0.15;
      const height = Math.min(W, H) * 0.5;
      const colors = ['#00ff9d', '#00e5ff', '#a855f7', '#f59e0b'];
      
      function draw() {
        ctx.fillStyle = 'rgba(3, 5, 8, 0.15)';
        ctx.fillRect(0, 0, W, H);
        
        const centerX = W / 2;
        const centerY = H / 2;
        
        rotation += 0.005;
        
        const points = [];
        for (let i = 0; i < basePairs; i++) {
          const t = i / (basePairs - 1);
          const angle = t * Math.PI * 8 + rotation;
          const y = (t - 0.5) * height;
          
          const x1 = Math.cos(angle) * radius;
          const z1 = Math.sin(angle) * radius;
          const x2 = Math.cos(angle + Math.PI) * radius;
          const z2 = Math.sin(angle + Math.PI) * radius;
          
          points.push({ x: x1, y: y, z: z1, color: colors[i % 4], t });
          points.push({ x: x2, y: y, z: z2, color: colors[(i + 2) % 4], t });
        }
        
        points.sort((a, b) => a.z - b.z);
        
        // Draw connections
        for (let i = 0; i < basePairs; i++) {
          const t = i / (basePairs - 1);
          const angle = t * Math.PI * 8 + rotation;
          const y = (t - 0.5) * height;
          const x1 = Math.cos(angle) * radius;
          const z1 = Math.sin(angle) * radius;
          const x2 = Math.cos(angle + Math.PI) * radius;
          const z2 = Math.sin(angle + Math.PI) * radius;
          
          const scale1 = 1 / (1 + z1 / 400);
          const scale2 = 1 / (1 + z2 / 400);
          
          if (z1 > -100 && z2 > -100) {
            ctx.beginPath();
            ctx.moveTo(centerX + x1 * scale1, centerY + y * scale1);
            ctx.lineTo(centerX + x2 * scale2, centerY + y * scale2);
            ctx.strokeStyle = `rgba(100, 116, 139, ${0.1 * scale1})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
        
        // Draw points with glow
        points.forEach(p => {
          const scale = 1 / (1 + p.z / 400);
          const alpha = (p.z + radius) / (radius * 2);
          const r = 3 * scale;
          
          // Glow
          const grad = ctx.createRadialGradient(
            centerX + p.x * scale, centerY + p.y * scale, 0,
            centerX + p.x * scale, centerY + p.y * scale, r * 4
          );
          grad.addColorStop(0, p.color);
          grad.addColorStop(0.4, p.color + '40');
          grad.addColorStop(1, 'transparent');
          
          ctx.beginPath();
          ctx.arc(centerX + p.x * scale, centerY + p.y * scale, r * 4, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.globalAlpha = Math.max(0, alpha * 0.5);
          ctx.fill();
          
          // Core
          ctx.beginPath();
          ctx.arc(centerX + p.x * scale, centerY + p.y * scale, r, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = Math.max(0.3, alpha);
          ctx.fill();
        });
        
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
